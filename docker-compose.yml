services:
  portfolio:
    build: .
    ports:
      - "${PORT:-8080}:3001"
    restart: unless-stopped
    environment:
      - PORT=3001
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
